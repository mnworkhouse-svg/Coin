<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coin Sell - Telegram Mini App</title>
    <!-- টেলিগ্রাম মিনি অ্যাপের অফিশিয়াল SDK স্ক্রিপ্ট -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1c1f26;
            color: #ffffff;
            margin: 0;
            padding: 20px;
            text-align: center;
        }
        .container {
            max-width: 400px;
            margin: 0 auto;
            background: #252932;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        .user-card {
            background: #313745;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            font-size: 14px;
        }
        .user-card img {
            border-radius: 50%;
            width: 50px;
            height: 50px;
            margin-bottom: 10px;
        }
        .coin-box {
            background: linear-gradient(135deg, #f39c12, #f1c40f);
            color: #000;
            padding: 20px;
            border-radius: 10px;
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 20px;
        }
        input, select {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 8px;
            border: 1px solid #444;
            background: #1c1f26;
            color: #fff;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            padding: 14px;
            background: #2ecc71;
            border: none;
            border-radius: 8px;
            color: white;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }
        button:hover {
            background: #27ae60;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Coin Sell Hub</h2>
    
    <!-- ইউজার ভেরিফিকেশন কার্ড -->
    <div class="user-card" id="user-info">
        <p>টেলিগ্রাম ভেরিফিকেশন চেক করা হচ্ছে...</p>
    </div>

    <!-- রেট বা কয়েন বক্স -->
    <div class="coin-box">
        1000 Coins = 100 BDT
    </div>

    <!-- ফর্ম -->
    <form id="sell-form">
        <label for="coin-amount">কয়েনের পরিমাণ লিখুন:</label>
        <input type="number" id="coin-amount" placeholder="উদা: 5000" required>

        <label for="payment-method">পেমেন্ট মেথড সিলেক্ট করুন:</label>
        <select id="payment-method">
            <option value="Bkash">বিকাশ (Bkash)</option>
            <option value="Nagad">নগদ (Nagad)</option>
            <option value="Rocket">রকেট (Rocket)</option>
        </select>

        <label for="wallet-number">আপনার অ্যাকাউন্ট নাম্বার:</label>
        <input type="text" id="wallet-number" placeholder="017xxxxxxxx" required>

        <button type="submit">কয়েন সেল করুন</button>
    </form>
</div>

<script>
    // টেলিগ্রাম ওয়েব অ্যাপ ইনিশিয়ালাইজ করা
    const tg = window.Telegram.WebApp;
    tg.expand(); // অ্যাপটি ফুল স্ক্রিন করার জন্য

    const userInfoDiv = document.getElementById('user-info');

    // টেলিগ্রাম থেকে অটো ইউজার ডেটা নেওয়া
    if (tg.initDataUnsafe && tg.initDataUnsafe.user) {
        const user = tg.initDataUnsafe.user;
        
        // ইউজারের নাম, আইডি ও ইউজারনেম শো করা (অটো ভেরিফাইড)
        userInfoDiv.innerHTML = `
            <p><strong>ভেরিফাইড ইউজার ✅</strong></p>
            <p>নাম: ${user.first_name} ${user.last_name || ''}</p>
            <p>ইউজারনেম: @${user.username || 'নাই'}</p>
            <p>টেলিগ্রাম আইডি: <code>${user.id}</code></p>
        `;
    } else {
        // যদি টেলিগ্রামের বাইরে (যেমন সাধারণ ব্রাউজারে) ওপেন করা হয়
        userInfoDiv.innerHTML = `
            <p style="color: #e74c3c;">⚠️ দয়া করে টেলিগ্রাম মিনি অ্যাপ থেকে ওপেন করুন।</p>
        `;
    }

    // ফর্ম সাবমিট হ্যান্ডলার
    document.getElementById('sell-form').addEventListener('submit', function(e) {
        e.preventDefault();
        
        const amount = document.getElementById('coin-amount').value;
        const method = document.getElementById('payment-method').value;
        const number = document.getElementById('wallet-number').value;

        // টেলিগ্রামে একটি পপআপ অ্যালার্ট দেখানো
        tg.showAlert(`আপনার ${amount} কয়েন সেলের রিকোয়েস্টটি সফল হয়েছে।\nমেথড: ${method}\nনাম্বার: ${number}`);
        
        // আপনি চাইলে এখানে টেলিগ্রাম বটের কাছে ডাটা ব্যাক পাঠাতে পারেন
        // tg.sendData(JSON.stringify({amount, method, number}));
    });
</script>

</body>
</html>
